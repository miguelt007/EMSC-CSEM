<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sismos em Tempo Real - EMSC + USGS</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root {
  --bg: #ffffff;
  --bg2: #f5f5f5;
  --text: #222;
  --accent: #007bff;
  --row-hover: #e9e9e9;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #121212;
    --bg2: #1e1e1e;
    --text: #e5e5e5;
    --accent: #4da3ff;
    --row-hover: #2a2a2a;
  }
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

#map {
  height: 420px;
  width: 100%;
  margin-bottom: 20px;
}

.container {
  max-width: 1200px;
  margin: auto;
  background: var(--bg2);
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.15);
}

h2 {
  margin-top: 0;
  text-align: center;
  font-size: 26px;
  color: var(--accent);
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

thead {
  background: var(--accent);
  color: white;
}

th, td {
  padding: 12px;
  text-align: left;
  font-size: 15px;
}

tbody tr:hover {
  background: var(--row-hover);
}

.mag-low { color: #2ecc71; font-weight: bold; }
.mag-mid { color: #f1c40f; font-weight: bold; }
.mag-high { color: #e67e22; font-weight: bold; }
.mag-veryhigh { color: #e74c3c; font-weight: bold; }

.map-icon {
  font-size: 20px;
  text-decoration: none;
}

@media (max-width: 700px) {
  table, thead, tbody, th, td, tr { display: block; }
  thead { display: none; }
  tr {
    margin-bottom: 15px;
    background: var(--bg);
    padding: 10px;
    border-radius: 10px;
  }
  td {
    display: flex;
    justify-content: space-between;
    padding: 8px 5px;
    border-bottom: 1px solid #3333;
  }
  td::before {
    content: attr(data-label);
    font-weight: bold;
    color: var(--accent);
  }
  td {
  white-space: nowrap;
  }
}
</style>
</head>

<body>

<div id="map"></div>

<div class="container">
  <h2>Sismos em Tempo Real (EMSC + USGS)</h2>

  <table id="eqTable">
    <thead>
      <tr>
        <th>Data/Hora</th>
        <th>Mag</th>
        <th>Prof</th>
        <th>LocalizaĂ§ĂŁo</th>
        <th>Entidade</th>
        <th>MMI</th>
        <th>CDI</th>
        <th>Relatos</th>
        <th>Mapa</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

let markersLayer = L.layerGroup().addTo(map);

function magClass(mag) {
  if (mag < 4) return "mag-low";
  if (mag < 5) return "mag-mid";
  if (mag < 6) return "mag-high";
  return "mag-veryhigh";
}

function markerColor(mag) {
  if (mag < 4) return "green";
  if (mag < 5) return "yellow";
  if (mag < 6) return "orange";
  return "red";
}

function markerSize(mag) {
  return 10 + mag * 4;
}

async function loadEarthquakes() {
  const emscUrl = "https://www.seismicportal.eu/fdsnws/event/1/query?limit=30&format=json";

  try {
    const response = await fetch(emscUrl);
    const data = await response.json();

    const tbody = document.querySelector("#eqTable tbody");
    tbody.innerHTML = "";
    markersLayer.clearLayers();

    for (const eq of data.features) {
      const p = eq.properties;
      const g = eq.geometry;

      const lat = g.coordinates[1];
      const lon = g.coordinates[0];
      const googleLink = `https://www.google.com/maps?q=${lat},${lon}`;

      // converter tempo do EMSC para ISO
      const t = new Date(p.time);
      const start = new Date(t.getTime() - 60000).toISOString();
      const end = new Date(t.getTime() + 60000).toISOString();

      // procurar no USGS
      const usgsUrl =
        `https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson` +
        `&latitude=${lat}&longitude=${lon}&maxradiuskm=20` +
        `&starttime=${start}&endtime=${end}`;

      let mmi = "N/A";
      let cdi = "N/A";
      let felt = "N/A";

      try {
        const usgsResp = await fetch(usgsUrl);
        const usgsData = await usgsResp.json();

        if (usgsData.features && usgsData.features.length > 0) {
          const u = usgsData.features[0].properties;
          mmi = (u.mmi !== null && u.mmi !== undefined) ? u.mmi : "N/A";
          cdi = (u.cdi !== null && u.cdi !== undefined) ? u.cdi : "N/A";
          felt = (u.felt !== null && u.felt !== undefined) ? u.felt : "N/A";
        }
      } catch (e) {
        console.warn("Erro ao consultar USGS:", e);
      }

      // marcador simples
      const size = markerSize(p.mag);
      const color = markerColor(p.mag);

      let icon = L.divIcon({
        className: "",
        html: `
          <div style="
            width:${size}px;
            height:${size}px;
            border-radius:50%;
            background:${color};
            box-shadow:0 0 10px ${color};
          "></div>
        `,
        iconSize: [size, size],
        iconAnchor: [size / 2, size / 2]
      });

      let marker = L.marker([lat, lon], { icon }).addTo(markersLayer);

      marker.bindPopup(`
        <b>${p.flynn_region}</b><br>
        <b>Magnitude:</b> ${p.mag}<br>
        <b>Profundidade:</b> ${p.depth} km<br>
        <b>Entidade:</b> ${p.auth}<br>
        <b>Mercalli (MMI):</b> ${mmi}<br>
        <b>Sentido (CDI):</b> ${cdi}<br>
        <b>Relatos:</b> ${felt}<br>
        <b>Data/Hora:</b> ${p.time}<br>
        <a href="${googleLink}" target="_blank">Abrir no Google Maps</a>
      `);

      // linha da tabela
      const row = `
        <tr>
          <td data-label="Data/Hora">${p.time}</td>
          <td data-label="Magnitude" class="${magClass(p.mag)}">${p.mag}</td>
          <td data-label="Profundidade">${p.depth} km</td>
          <td data-label="LocalizaĂ§ĂŁo">${p.flynn_region}</td>
          <td data-label="Entidade">${p.auth}</td>
          <td data-label="MMI">${mmi}</td>
          <td data-label="CDI">${cdi}</td>
          <td data-label="Relatos">${felt}</td>
          <td data-label="Mapa">
              <a class="map-icon" href="${googleLink}" target="_blank">đźŚŤ</a>
          </td>
        </tr>
      `;
      tbody.innerHTML += row;
    }

  } catch (e) {
    console.error("Erro ao carregar dados:", e);
  }
}

loadEarthquakes();
setInterval(loadEarthquakes, 180000);
</script>

</body>
</html>
